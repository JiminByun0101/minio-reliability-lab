---
# 1. Detect the external IP of the master node.
#    Required for TLS SAN — without it, worker nodes see "x509: certificate signed by unknown authority".
- name: Detect external IP (multi-cloud)
  when: inventory_hostname in groups['k3s_master']
  shell: |
    curl -s -H "Metadata-Flavor: Google" \
      http://metadata.google.internal/computeMetadata/v1/instance/network-interfaces/0/access-configs/0/external-ip \
    || curl -s http://169.254.169.254/latest/meta-data/public-ipv4 \
    || hostname -I | awk '{print $1}'
  register: external_ip
  changed_when: false
- name: Show detected external IP
  debug:
    var: external_ip.stdout
  when: inventory_hostname in groups['k3s_master']

# 2. Install the K3s server (control plane)
- name: Install K3s on master
  when: inventory_hostname in groups['k3s_master']
  shell: |
    curl -sfL {{ k3s_install_url }} | \
      INSTALL_K3S_CHANNEL={{ k3s_channel }} \
      INSTALL_K3S_EXEC="server \
        --cluster-init \
        --bind-address 0.0.0.0 \
        --advertise-address {{ external_ip.stdout }} \
        --tls-san {{ external_ip.stdout }} \
        --tls-san {{ ansible_hostname }} \
        {{ k3s_server_args }}" sh -
  args:
    creates: /usr/local/bin/k3s
  notify: restart k3s

# 3. Capture the master’s join token
- name: Retrieve join token
  when: inventory_hostname in groups['k3s_master']
  slurp:
    src: "{{ k3s_token_file }}"
  register: master_token

# 4. Share that token with workers
- name: Share join token
  add_host:
    name: shared_k3s_token
    token: "{{ master_token.content | b64decode | trim }}"
  when: inventory_hostname in groups['k3s_master']

# 5. Join each worker to the cluster
- name: Install K3s agent
  when: inventory_hostname in groups['k3s_workers']
  shell: |
    curl -sfL {{ k3s_install_url }} | \
      K3S_URL="https://{{ hostvars['master']['ansible_host'] }}:6443" \
      K3S_TOKEN="{{ hostvars['shared_k3s_token']['token'] }}" \
      INSTALL_K3S_CHANNEL={{ k3s_channel }} \
      INSTALL_K3S_EXEC="agent" sh -
  args:
    creates: /usr/local/bin/k3s-agent
  notify: restart k3s-agent

# 6. Wait for service activation to complete
- name: Wait for K3s service active
  shell: systemctl is-active k3s 2>/dev/null || systemctl is-active k3s-agent 2>/dev/null
  register: service_status
  retries: 12
  delay: 10
  until: "'active' in service_status.stdout"
  changed_when: false

- name: Patch kubeconfig with external IP
  lineinfile:
    path: /etc/rancher/k3s/k3s.yaml
    regexp: '^    server:'
    line: "    server: https://{{ external_ip.stdout }}:6443"
  when: inventory_hostname in groups['k3s_master']  

# 7. Run cluster verification (only on master)
- import_tasks: verify.yml
  when: inventory_hostname in groups['k3s_master']
